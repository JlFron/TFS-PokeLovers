name: Build TFS 0.3.6

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev libboost-all-dev automake autoconf pkg-config libtool
    
    - name: Regenerate build system
      run: |
        cd $GITHUB_WORKSPACE
        autoreconf -fiv 2>&1 | tee autoreconf.log
        echo "=== autoreconf completed ==="
    
    - name: Configure
      run: |
        cd $GITHUB_WORKSPACE
        ls -la configure
        ./configure --prefix=/opt/tfs 2>&1 | tee configure.log
        echo "=== configure completed ==="
    
    - name: Build
      run: |
        cd $GITHUB_WORKSPACE
        make -j4 2>&1 | tee make.log
        echo "=== make completed ==="
    
    - name: Show build logs on failure
      if: failure()
      run: |
        cd $GITHUB_WORKSPACE
        echo "=== autoreconf.log ===" && tail -100 autoreconf.log || true
        echo "=== configure.log ===" && tail -100 configure.log || true
        echo "=== make.log ===" && tail -100 make.log || true
    
    - name: Check binary
      run: |
        cd $GITHUB_WORKSPACE
        ls -lh tfs || echo "Binary not found!"
        file tfs || echo "File command failed"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfs-binary
        path: tfs
        retention-days: 30
    
    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: tfs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
